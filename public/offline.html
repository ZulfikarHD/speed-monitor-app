<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Offline - SafeTrack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            text-align: center;
            max-width: 400px;
        }

        .icon-container {
            margin-bottom: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .icon {
            width: 120px;
            height: 120px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #f1f5f9;
        }

        p {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .button {
            display: inline-block;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 0.875rem 2rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
            padding: 0.75rem 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 0.5rem;
            font-size: 0.875rem;
            color: #fca5a5;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .help-text {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Cloud Offline Icon -->
        <div class="icon-container">
            <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Cloud -->
                <path d="M18 10C19.3132 10.6455 20.3018 12.0073 20.622 13.6485C20.942 15.2892 20.5581 16.9985 19.5657 18.3506C18.5734 19.7027 17.0552 20.5772 15.3825 20.7731C13.7097 20.969 12.0309 20.4657 10.7272 19.3782" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M9.99999 18C8.67452 18 7.40301 17.4732 6.46533 16.5355C5.52765 15.5979 5.00001 14.3261 5 13.0007C4.99999 11.6752 5.52763 10.4034 6.46531 9.46573C7.40298 8.52805 8.67449 8.00041 9.99997 8.00001C10.4604 6.7999 11.2465 5.75423 12.2666 4.98636C13.2866 4.21848 14.4983 3.75862 15.7613 3.65595C17.0242 3.55328 18.2893 3.81167 19.4048 4.40001C20.5202 4.98835 21.4407 5.8834 22.0588 6.9816C22.6769 8.07981 22.9673 9.33594 22.8975 10.599C22.8276 11.8621 22.4005 13.0784 21.6667 14.1108" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

                <!-- Slash through cloud -->
                <line x1="4" y1="20" x2="20" y2="4" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </div>

        <!-- Content -->
        <h1>Anda Sedang Offline</h1>
        <p>Tidak dapat terhubung ke internet. Periksa koneksi Anda dan coba lagi.</p>

        <!-- Retry Button -->
        <button class="button" onclick="window.location.reload()">
            Coba Lagi
        </button>

        <!-- Status Indicator -->
        <div class="status">
            <span class="status-dot"></span>
            <span>Tidak ada koneksi internet</span>
        </div>

        <!-- Help Text -->
        <div class="help-text">
            Aplikasi akan bekerja kembali setelah koneksi internet tersedia.
        </div>
    </div>
</body>
</html>
